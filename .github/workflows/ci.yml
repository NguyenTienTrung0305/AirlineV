name: CI

# Job	            -     1 nhóm việc chạy trên 1 máy ảo riêng
# Step	          -     1 lệnh/hành động trong job
# Runner	        -     máy ảo GitHub cấp miễn phí (vd ubuntu-latest) để chạy job
# Trigger (on:)	  -     sự kiện kích hoạt (push, pull_request)

# Trigger: chạy khi push lên master, hoặc khi mở/cập nhật Pull Request vào master.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ---- Job 1: kiểm tra lint frontend (hiện chưa chặn vì ESLint config đang lỗi) ----
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # setup-node cài Node 22 + bật cache npm để các lần sau cài nhanh hơn.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # continue-on-error: lint lỗi thì chỉ cảnh báo (vàng), KHÔNG làm fail cả CI.
      # TODO: bỏ dòng này sau khi sửa xong eslint.config.mjs.
      - name: Lint
        run: npm run lint
        continue-on-error: true

  # ---- Job 2: build thử image backend (xác nhận Dockerfile + deps OK) ----
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Buildx = trình build Docker nâng cao
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: airline-backend:ci
          # Cache layer Docker trên hạ tầng GitHub Actions => lần build sau nhanh hơn
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Job 3: build thử image frontend (cần build-args cho NEXT_PUBLIC_*) ----
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: airline-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8080' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
            NEXT_PUBLIC_API_KEY=${{ vars.NEXT_PUBLIC_API_KEY || 'demo-key' }}
            NEXT_PUBLIC_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_AUTH_DOMAIN || 'demo.firebaseapp.com' }}
            NEXT_PUBLIC_PROJECT_ID=${{ vars.NEXT_PUBLIC_PROJECT_ID || 'demo' }}
            NEXT_PUBLIC_STORAGE_BUCKET=${{ vars.NEXT_PUBLIC_STORAGE_BUCKET || 'demo.appspot.com' }}
            NEXT_PUBLIC_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_MESSAGING_SENDER_ID || '000000000000' }}
            NEXT_PUBLIC_APP_ID=${{ vars.NEXT_PUBLIC_APP_ID || '1:000:web:demo' }}
            NEXT_PUBLIC_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_MEASUREMENT_ID || 'G-DEMO' }}
