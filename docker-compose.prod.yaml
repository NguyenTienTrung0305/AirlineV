services:
  backend:
    image: ${ECR_REGISTRY}/airlinev-backend:latest # Kéo từ ECR, không cần build
    container_name: airline_backend
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      HOST: 0.0.0.0
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      GOOGLE_APPLICATION_CREDENTIALS: /app/serviceAccountKey.json
      CLOUD_NAME: ${CLOUD_NAME}
      CLOUD_API_KEY: ${CLOUD_API_KEY}
      CLOUD_API_SECRET: ${CLOUD_API_SECRET}
    volumes:
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    restart: unless-stopped
    networks:
      - airline_net

  frontend:
    image: ${ECR_REGISTRY}/airlinev-frontend:latest
    container_name: airline_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - airline_net

  nginx:
    image: nginx:alpine
    container_name: airline_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # nginx cần đọc cert + phục vụ challenge
      - certbot_certs:/etc/letsencrypt:ro # đọc cert
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - airline_net
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    image: certbot/certbot
    container_name: airline_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt # nơi lưu cert
      - certbot_www:/var/www/certbot # nơi ghi file challenge
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
networks:
  airline_net:
    driver: bridge

volumes:
  certbot_certs:
  certbot_www:
