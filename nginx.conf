events {}

http {
    server {
        listen 80;
        server_name airlinev.duckdns.org; # domain, xử lý request đến từ domain này
        
        # Request có đường dẫn bắt đầu bằng /api/ đến từ domain airlinev.duckdns.org và từ port 80 sẽ được chuyển tiếp đến http://backend:8080, đồng thời cắt bỏ /api
        location /api/ {
            proxy_pass http://backend:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend:3000;  
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Mọi request bắt đầu bằng /.well-known/acme-challenge/ thì nginx sẽ đọc file từ thư mục /var/www/certbot rồi trả về cho thằng request
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;  # thư mục chứa file xác minh của certbot
        }
    }
}